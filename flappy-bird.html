<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Bird Clone</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #2b2b2b;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
  }
  canvas {
    background: #70c5ce;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    touch-action: none;
    display: block;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const GROUND_H = 40;

  // Physics constants
  const GRAVITY = 0.25;
  const JUMP_VELOCITY = -5.5;
  const PIPE_SPEED = 2;
  const PIPE_SPAWN_INTERVAL = 100;
  const PIPE_GAP = 130;
  const PIPE_WIDTH = 52;

  // Colors
  const COLOR_SKY = '#70c5ce';
  const COLOR_PIPE = '#73c738';
  const COLOR_PIPE_DARK = '#5aa02c';
  const COLOR_BIRD = '#f7d138';
  const COLOR_GROUND = '#ded895';
  const COLOR_GROUND_DARK = '#c8bf6f';

  const STATE = { START: 'START', PLAYING: 'PLAYING', GAMEOVER: 'GAMEOVER' };
  let state = STATE.START;

  let highScore = parseInt(localStorage.getItem('flappyHighScore') || '0', 10);
  let score = 0;
  let frame = 0;
  let blinkTimer = 0;

  const bird = {
    x: 80,
    y: H / 2,
    w: 30,
    h: 24,
    velocity: 0,
    rotation: 0
  };

  let pipes = [];

  function resetGame() {
    bird.y = H / 2;
    bird.velocity = 0;
    bird.rotation = 0;
    pipes = [];
    score = 0;
    frame = 0;
    state = STATE.START;
  }

  function startGame() {
    state = STATE.PLAYING;
    bird.velocity = JUMP_VELOCITY;
  }

  function flap() {
    if (state === STATE.START) {
      startGame();
    } else if (state === STATE.PLAYING) {
      bird.velocity = JUMP_VELOCITY;
    } else if (state === STATE.GAMEOVER) {
      resetGame();
    }
  }

  function spawnPipe() {
    const minTop = 40;
    const maxTop = H - GROUND_H - PIPE_GAP - 40;
    const topHeight = Math.floor(Math.random() * (maxTop - minTop + 1)) + minTop;
    pipes.push({
      x: W,
      topHeight: topHeight,
      bottomY: topHeight + PIPE_GAP,
      passed: false
    });
  }

  function updatePlaying() {
    frame++;

    // Bird physics
    bird.velocity += GRAVITY;
    bird.y += bird.velocity;
    bird.rotation = Math.max(-0.5, Math.min(1.3, bird.velocity * 0.08));

    // Spawn pipes
    if (frame % PIPE_SPAWN_INTERVAL === 0) {
      spawnPipe();
    }

    // Move pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
      const p = pipes[i];
      p.x -= PIPE_SPEED;

      // Scoring
      if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
        p.passed = true;
        score++;
      }

      // Remove off-screen pipes
      if (p.x + PIPE_WIDTH < 0) {
        pipes.splice(i, 1);
      }
    }

    // Collision: ceiling
    if (bird.y - bird.h / 2 <= 0) {
      bird.y = bird.h / 2;
      triggerGameOver();
      return;
    }

    // Collision: ground
    if (bird.y + bird.h / 2 >= H - GROUND_H) {
      bird.y = H - GROUND_H - bird.h / 2;
      triggerGameOver();
      return;
    }

    // Collision: pipes (bounding box)
    const bx1 = bird.x - bird.w / 2;
    const bx2 = bird.x + bird.w / 2;
    const by1 = bird.y - bird.h / 2;
    const by2 = bird.y + bird.h / 2;

    for (const p of pipes) {
      const px1 = p.x;
      const px2 = p.x + PIPE_WIDTH;
      if (bx2 > px1 && bx1 < px2) {
        if (by1 < p.topHeight || by2 > p.bottomY) {
          triggerGameOver();
          return;
        }
      }
    }
  }

  function triggerGameOver() {
    state = STATE.GAMEOVER;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('flappyHighScore', String(highScore));
    }
  }

  // ---------- Drawing ----------

  function drawBackground() {
    ctx.fillStyle = COLOR_SKY;
    ctx.fillRect(0, 0, W, H);

    // Simple cloud decorations (static, cosmetic)
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(80, 100, 30, 14, 0, 0, Math.PI * 2);
    ctx.ellipse(300, 180, 24, 11, 0, 0, Math.PI * 2);
    ctx.ellipse(200, 70, 20, 9, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    ctx.fillStyle = COLOR_GROUND;
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = COLOR_GROUND_DARK;
    ctx.fillRect(0, H - GROUND_H, W, 6);

    // Ground stripes
    ctx.fillStyle = COLOR_GROUND_DARK;
    const stripeOffset = (frame * PIPE_SPEED) % 20;
    for (let x = -stripeOffset; x < W; x += 20) {
      ctx.fillRect(x, H - GROUND_H + 10, 10, 4);
    }
  }

  function drawPipe(p) {
    // Top pipe
    ctx.fillStyle = COLOR_PIPE;
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight);
    ctx.fillStyle = COLOR_PIPE_DARK;
    ctx.fillRect(p.x - 3, p.topHeight - 20, PIPE_WIDTH + 6, 20);

    // Bottom pipe
    ctx.fillStyle = COLOR_PIPE;
    ctx.fillRect(p.x, p.bottomY, PIPE_WIDTH, H - GROUND_H - p.bottomY);
    ctx.fillStyle = COLOR_PIPE_DARK;
    ctx.fillRect(p.x - 3, p.bottomY, PIPE_WIDTH + 6, 20);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);

    // Body
    ctx.fillStyle = COLOR_BIRD;
    ctx.beginPath();
    ctx.ellipse(0, 0, bird.w / 2, bird.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing
    ctx.fillStyle = '#e0b62f';
    const wingFlap = Math.sin(frame * 0.3) * 4;
    ctx.beginPath();
    ctx.ellipse(-4, 2 + wingFlap, 9, 6, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(8, -4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(9.5, -4, 2, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#e8912b';
    ctx.beginPath();
    ctx.moveTo(bird.w / 2 - 2, 0);
    ctx.lineTo(bird.w / 2 + 10, -2);
    ctx.lineTo(bird.w / 2 + 10, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function drawScore(x, y, value, size) {
    ctx.font = `bold ${size}px 'Courier New', monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = size / 10;
    ctx.strokeText(value, x, y);
    ctx.fillText(value, x, y);
  }

  function drawStartScreen() {
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.font = "bold 36px 'Courier New', monospace";
    ctx.strokeText('Flappy Bird', W / 2, 130);
    ctx.fillText('Flappy Bird', W / 2, 130);

    ctx.font = "bold 16px 'Courier New', monospace";
    ctx.lineWidth = 2;
    ctx.strokeText(`High Score: ${highScore}`, W / 2, 175);
    ctx.fillText(`High Score: ${highScore}`, W / 2, 175);

    blinkTimer++;
    if (Math.floor(blinkTimer / 30) % 2 === 0) {
      ctx.font = "bold 15px 'Courier New', monospace";
      ctx.strokeText('Press SPACE or CLICK to Fly', W / 2, H / 2 + 80);
      ctx.fillText('Press SPACE or CLICK to Fly', W / 2, H / 2 + 80);
    }
  }

  function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.textAlign = 'center';
    ctx.font = "bold 34px 'Courier New', monospace";
    ctx.strokeText('GAME OVER', W / 2, H / 2 - 60);
    ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

    ctx.font = "bold 20px 'Courier New', monospace";
    ctx.lineWidth = 2;
    ctx.strokeText(`Score: ${score}`, W / 2, H / 2 - 10);
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 10);

    ctx.strokeText(`High Score: ${highScore}`, W / 2, H / 2 + 25);
    ctx.fillText(`High Score: ${highScore}`, W / 2, H / 2 + 25);

    ctx.font = "bold 14px 'Courier New', monospace";
    ctx.strokeText('Press SPACE or CLICK to Restart', W / 2, H / 2 + 70);
    ctx.fillText('Press SPACE or CLICK to Restart', W / 2, H / 2 + 70);
  }

  function draw() {
    drawBackground();
    for (const p of pipes) drawPipe(p);
    drawGround();
    drawBird();

    if (state === STATE.PLAYING) {
      drawScore(W / 2, 60, String(score), 40);
    } else if (state === STATE.START) {
      drawStartScreen();
    } else if (state === STATE.GAMEOVER) {
      drawScore(W / 2, 60, String(score), 40);
      drawGameOverScreen();
    }
  }

  function loop() {
    if (state === STATE.PLAYING) {
      updatePlaying();
    }
    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Input Handling ----------

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      flap();
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    flap();
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    flap();
  }, { passive: false });

  // Prevent page scroll on space in case of missed keydown capture elsewhere
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') e.preventDefault();
  }, { passive: false });

  resetGame();
  loop();
})();
</script>
</body>
</html>
